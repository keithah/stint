name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  stint-cli:
    name: Build Stint CLI release assets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/keithah/stint/internal/stintcli.versionValue=${VERSION} -X github.com/keithah/stint/internal/stintcli.commitValue=${COMMIT} -X github.com/keithah/stint/internal/stintcli.buildDateValue=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/stint \
            ./cmd/stint
      - name: Package binary
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          tar -C dist -czf "stint_${VERSION}_${GOOS}_${GOARCH}.tar.gz" stint
      - uses: actions/upload-artifact@v4
        with:
          name: stint-${{ matrix.goos }}-${{ matrix.goarch }}
          path: stint_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  publish:
    name: Publish GitHub release
    needs: stint-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: stint-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: stint_*.tar.gz
          generate_release_notes: true
