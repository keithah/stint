<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="Terminal showing Stint CLI install and doctor check">
  <rect width="960" height="600" fill="#070b10"/>
  <rect x="72" y="62" width="816" height="476" rx="18" fill="#0f1720" stroke="#243244"/>
  <circle cx="104" cy="94" r="8" fill="#ef4444"/><circle cx="132" cy="94" r="8" fill="#f59e0b"/><circle cx="160" cy="94" r="8" fill="#22c55e"/>
  <text x="96" y="154" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26">$ curl -fsSL https://stint.fyi/install.sh | sh</text>
  <text x="96" y="204" fill="#d4d4d8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">Stint CLI installed at ~/.local/bin/stint</text>
  <text x="96" y="274" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26">$ stint doctor</text>
  <text x="96" y="324" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">✓ API endpoint reachable</text>
  <text x="96" y="368" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">✓ Integration key accepted</text>
  <text x="96" y="412" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">✓ Offline queue ready</text>
</svg>
