<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="Terminal showing WakaTime CLI sending a heartbeat to Stint">
  <rect width="960" height="600" fill="#070b10"/>
  <rect x="82" y="74" width="796" height="452" rx="18" fill="#101820" stroke="#26364a"/>
  <text x="116" y="145" fill="#d4d4d8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25">~/.wakatime.cfg</text>
  <text x="116" y="204" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">api_url = https://stint.fyi/api/v1</text>
  <text x="116" y="248" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">api_key = waka_••••••••</text>
  <text x="116" y="330" fill="#a7f3d0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">$ wakatime-cli --entity README.md --write</text>
  <text x="116" y="386" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">heartbeat accepted by Stint</text>
</svg>
